ci:
  autoupdate_schedule: monthly

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml
      - id: end-of-file-fixer
        exclude: ^(docs/doxygen/|out/|build[^/]*/|reference/|third_party/)
      - id: trailing-whitespace
        exclude: ^(docs/doxygen/|out/|build[^/]*/|reference/|third_party/)

