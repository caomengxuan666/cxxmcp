name: release-sdk

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  sdk-source-release:
    name: sdk-source-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Create SDK source archive
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          package="cxxmcp-sdk-source-${tag}.tar.gz"
          prefix="cxxmcp-sdk-${tag}"
          mkdir -p release-artifacts

          tar \
            --exclude-vcs \
            --exclude='./release-artifacts' \
            --exclude='./docs/doxygen' \
            --transform "s,^,${prefix}/," \
            -czf "release-artifacts/${package}" \
            CMakeLists.txt \
            CMakePresets.json \
            cmake \
            sdk \
            extensions \
            examples \
            tests \
            docs \
            packaging \
            conanfile.py \
            third_party/tl \
            third_party/jsonrpcpp \
            third_party/nlohmann \
            third_party/httplib/httplib.h \
            README.md \
            README_zh.md \
            CHANGELOG.md \
            LICENSE \
            .clang-format \
            .clang-tidy

          (
            cd release-artifacts
            sha256sum "${package}" > SHA256SUMS.txt
          )

      - name: Create release notes
        shell: bash
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"
          package="cxxmcp-sdk-source-${tag}.tar.gz"

          cat > release-artifacts/RELEASE_NOTES.md <<EOF
          # cxxmcp ${tag}

          SDK source release for ${tag}.

          This release intentionally publishes SDK source, compatibility notes,
          and checksums only. Runtime, gateway, CLI, and other tool binaries are
          not attached to this SDK release.

          ## Artifacts

          - ${package}
          - SHA256SUMS.txt
          - RELEASE_NOTES.md

          ## Compatibility Notes

          - Public SDK source compatibility follows CHANGELOG.md and
            docs/compatibility_policy.md in the source archive.
          - Public SDK package targets remain under the cxxmcp:: namespace.
          - Static-library releases do not claim ABI stability.
          - Runtime, gateway, CLI, app, adapters, and plugin SDK targets remain
            optional layers outside the core SDK contract.

          ## Evidence Notes

          - Release-gate, Doxygen, source-artifact, and release-evidence
            workflow artifacts must come from the same commit before this tag is
            promoted as a release candidate or fact-standard-ready release.
          - Do not claim fact-standard readiness unless
            docs/release_candidate_checklist.md is complete for this exact
            commit.

          ## Checksums

          \`\`\`text
          $(cat release-artifacts/SHA256SUMS.txt)
          \`\`\`
          EOF

      - name: Publish GitHub release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          tag="${GITHUB_REF_NAME}"

          if gh release view "${tag}" >/dev/null 2>&1; then
            gh release upload "${tag}" \
              "release-artifacts/cxxmcp-sdk-source-${tag}.tar.gz" \
              "release-artifacts/SHA256SUMS.txt" \
              "release-artifacts/RELEASE_NOTES.md" \
              --clobber
            gh release edit "${tag}" --notes-file "release-artifacts/RELEASE_NOTES.md"
          else
            gh release create "${tag}" \
              "release-artifacts/cxxmcp-sdk-source-${tag}.tar.gz" \
              "release-artifacts/SHA256SUMS.txt" \
              "release-artifacts/RELEASE_NOTES.md" \
              --title "cxxmcp ${tag}" \
              --notes-file "release-artifacts/RELEASE_NOTES.md" \
              --verify-tag
          fi
