name: pages

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: build-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install documentation tools
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen ninja-build

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Configure docs build
        run: >
          cmake -S . -B build-pages -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCXXMCP_BUILD_DOCS=ON
          -DCXXMCP_BUILD_TESTS=OFF

      - name: Build Doxygen API docs
        run: cmake --build build-pages --target docs

      - name: Assemble Pages site
        run: |
          set -euo pipefail
          rm -rf public
          mkdir -p public/api
          cp -a docs/pages/. public/
          cp -a docs/doxygen/html/. public/api/
          touch public/.nojekyll
          test -f public/index.html
          test -f public/getting-started.html
          test -f public/tutorials.html
          test -f public/concepts.html
          test -f public/cookbook.html
          test -f public/transports.html
          test -f public/troubleshooting.html
          test -f public/migration.html
          test -f public/changelog.html
          test -f public/contributing.html
          test -f public/roadmap.html
          test -f public/security.html
          test -f public/auth.html
          test -f public/stability.html
          test -f public/api/index.html
          grep -q 'href="./getting-started.html"' public/index.html
          grep -q 'href="./tutorials.html"' public/index.html
          grep -q 'href="./auth.html"' public/index.html
          grep -q 'href="./stability.html"' public/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    name: deploy-pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
