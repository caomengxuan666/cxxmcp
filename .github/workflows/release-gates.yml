name: release-gates

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
      - '*.md'
      - '.github/workflows/pages.yml'

concurrency:
  group: release-gates-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-style:
    name: source-style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install style tools
        run: |
          pip install clang-format==22.1.1
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Check formatting
        shell: pwsh
        run: pwsh -NoProfile -File scripts/format.ps1 -Check

      - name: Run cpplint
        shell: pwsh
        run: pwsh -NoProfile -File scripts/check-cpplint.ps1

      - name: Check protocol model coverage
        run: python scripts/check_protocol_model_coverage.py --source .

      - name: Checkout pinned RMCP reference
        run: |
          mkdir -p reference
          git clone https://github.com/modelcontextprotocol/rust-sdk.git reference/rmcp
          git -C reference/rmcp checkout c330fede90e4729c234f8e87fdbc5ea27a1dd10c

      - name: Check RMCP source drift
        run: python scripts/check_rmcp_source_drift.py --source .

      - name: Check SDK header boundaries
        run: python scripts/check_sdk_header_boundaries.py --source .

      - name: Check unresolved source markers
        run: python scripts/check_source_markers.py --source .

      - name: Check package auth features
        run: python scripts/check_package_auth_features.py --source .

      - name: Check package recipe sync
        run: python scripts/check_package_recipe_sync.py --source .

      - name: Self-test release artifact verifier
        run: python scripts/selftest_release_artifacts.py

      - name: Self-test public API surface comparison
        run: python scripts/selftest_public_api_surface.py

      - name: Check P2 TODO status
        run: python scripts/check_p2_todo_status.py --source .

  build-config-smoke:
    name: sdk-build-${{ matrix.build_type }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        build_type:
          - Debug
          - Release

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure SDK build
        run: |
          cmake \
            -S . \
            -B build-config-smoke \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
            -DCXXMCP_BUILD_SDK=ON \
            -DCXXMCP_BUILD_CLIENT=ON \
            -DCXXMCP_BUILD_SERVER=ON \
            -DCXXMCP_BUILD_EXAMPLES=ON \
            -DCXXMCP_BUILD_TESTS=OFF \
            -DCXXMCP_BUILD_DOCS=OFF \
            -DCXXMCP_ENABLE_HTTP=ON \
            -DCXXMCP_ENABLE_WEBSOCKET=ON

      - name: Build SDK
        run: cmake --build build-config-smoke --parallel

  performance-evidence:
    name: performance-evidence-linux-gcc-ninja
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure performance evidence
        run: |
          cmake \
            -S . \
            -B build-performance-evidence \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCXXMCP_BUILD_SDK=ON \
            -DCXXMCP_BUILD_CLIENT=OFF \
            -DCXXMCP_BUILD_SERVER=OFF \
            -DCXXMCP_BUILD_EXAMPLES=OFF \
            -DCXXMCP_BUILD_TESTS=ON \
            -DCXXMCP_BUILD_DOCS=OFF

      - name: Build serialization benchmark
        run: >
          cmake --build build-performance-evidence --parallel
          --target mcp_protocol_serialization_benchmark

      - name: Run serialization benchmark
        run: |
          mkdir -p build-performance-evidence/test-results
          ctest \
            --test-dir build-performance-evidence \
            -R "^protocol_serialization_benchmark$" \
            --output-on-failure \
            --timeout 120 \
            --output-junit test-results/performance-evidence.xml
          test -s build-performance-evidence/test-results/performance-evidence.xml

      - name: Upload performance evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-performance-evidence-linux-gcc-ninja
          path: |
            build-performance-evidence/CMakeCache.txt
            build-performance-evidence/test-results/performance-evidence.xml
            build-performance-evidence/Testing/Temporary/*.log
          if-no-files-found: error

  public-header-compile-evidence:
    name: public-header-compile-evidence-linux-gcc-ninja
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Ninja
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Configure public-header compile evidence
        run: |
          cmake \
            -S . \
            -B build-public-header-compile-evidence \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCXXMCP_BUILD_SDK=ON \
            -DCXXMCP_BUILD_CLIENT=ON \
            -DCXXMCP_BUILD_SERVER=ON \
            -DCXXMCP_BUILD_EXAMPLES=OFF \
            -DCXXMCP_BUILD_TESTS=ON \
            -DCXXMCP_ENABLE_AUTH=ON \
            -DCXXMCP_ENABLE_HTTP=ON \
            -DCXXMCP_ENABLE_WEBSOCKET=ON \
            -DCXXMCP_BUILD_DOCS=OFF

      - name: Build SDK dependencies
        run: >
          cmake --build build-public-header-compile-evidence --parallel
          --target mcp_protocol mcp_client mcp_server

      - name: Collect public-header compile evidence
        run: |
          python scripts/collect_public_header_compile_evidence.py \
            --build-dir build-public-header-compile-evidence \
            --output build-public-header-compile-evidence/public-header-compile-evidence.json \
            --parallel 1

      - name: Upload public-header compile evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-public-header-compile-evidence-linux-gcc-ninja
          path: |
            build-public-header-compile-evidence/CMakeCache.txt
            build-public-header-compile-evidence/public-header-compile-evidence.json
          if-no-files-found: error

  sanitizer:
    name: sanitizer-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: asan-ubsan
            configure_preset: tests-asan-ubsan
            build_preset: tests-asan-ubsan
            test_preset: sanitizer-asan-ubsan
          - name: tsan
            configure_preset: tests-tsan
            build_preset: tests-tsan
            test_preset: sanitizer-tsan

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install sanitizer tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang ninja-build

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout pinned RMCP reference
        run: |
          mkdir -p reference
          git clone https://github.com/modelcontextprotocol/rust-sdk.git reference/rmcp
          git -C reference/rmcp checkout c330fede90e4729c234f8e87fdbc5ea27a1dd10c

      - name: Cache Rust cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-gates
          shared-key: linux-rust
          workspaces: |
            reference/rmcp/conformance
            tests/fixtures/rmcp_pagination_client
          env-vars: CARGO_TARGET_DIR
          cache-targets: true
          cache-on-failure: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Configure sanitizer build
        run: cmake --preset ${{ matrix.configure_preset }}

      - name: Build sanitizer tests
        run: cmake --build --preset ${{ matrix.build_preset }} --parallel

      - name: Run sanitizer release-blocking subset
        run: ctest --preset ${{ matrix.test_preset }}

  clang-tidy:
    name: clang-tidy-public-headers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy ninja-build

      - name: Configure
        run: |
          cmake \
            -S . \
            -B build-clang-tidy \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON \
            -DCXXMCP_BUILD_SDK=ON \
            -DCXXMCP_BUILD_CLIENT=ON \
            -DCXXMCP_BUILD_SERVER=ON \
            -DCXXMCP_BUILD_EXAMPLES=OFF \
            -DCXXMCP_BUILD_TESTS=ON \
            -DCXXMCP_ENABLE_AUTH=ON \
            -DCXXMCP_ENABLE_HTTP=ON \
            -DCXXMCP_ENABLE_WEBSOCKET=ON \
            -DCXXMCP_BUILD_DOCS=OFF

      - name: Build public header fixtures
        run: |
          cmake --build build-clang-tidy --parallel --target \
            mcp_public_header_auth \
            mcp_public_header_auth_client_orchestrator \
            mcp_public_header_auth_constant_time \
            mcp_public_header_auth_dpop \
            mcp_public_header_auth_http_jwks_endpoint \
            mcp_public_header_auth_http_metadata_endpoint \
            mcp_public_header_auth_http_token_endpoint \
            mcp_public_header_auth_jwks \
            mcp_public_header_auth_lifecycle \
            mcp_public_header_auth_loopback_receiver \
            mcp_public_header_auth_metadata \
            mcp_public_header_auth_pkce \
            mcp_public_header_auth_registration \
            mcp_public_header_auth_server_auth_endpoints \
            mcp_public_header_auth_server_auth_provider \
            mcp_public_header_auth_token \
            mcp_public_header_auth_types \
            mcp_public_header_auth_www_auth \
            mcp_public_header_client \
            mcp_public_header_config \
            mcp_public_header_error \
            mcp_public_header_handler \
            mcp_public_header_peer \
            mcp_public_header_protocol \
            mcp_public_header_protocol_types \
            mcp_public_header_protocol_types_reflect \
            mcp_public_header_sdk \
            mcp_public_header_server \
            mcp_public_header_service \
            mcp_public_header_transport \
            mcp_public_header_websocket_transport

      - name: Run clang-tidy
        run: |
          python scripts/run_clang_tidy.py \
            --source . \
            --build-dir build-clang-tidy \
            tests/sdk/public_headers

  auth-release-gate:
    name: auth-${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc-ninja
            os: ubuntu-latest
            generator: Ninja
            build_type: Debug
            cc: gcc
            cxx: g++
          - name: windows-msvc-ninja
            os: windows-latest
            generator: Ninja
            build_type: Debug
            cc: cl
            cxx: cl

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y ninja-build
          elif [[ "${RUNNER_OS}" == "Windows" ]]; then
            choco install ninja --no-progress
          fi

      - name: Configure auth-enabled SDK
        shell: pwsh
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          cmake `
            -S . `
            -B build-auth-release-gate `
            -G "${{ matrix.generator }}" `
            -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} `
            -DCXXMCP_BUILD_SDK=ON `
            -DCXXMCP_BUILD_CLIENT=ON `
            -DCXXMCP_BUILD_SERVER=ON `
            -DCXXMCP_BUILD_EXAMPLES=OFF `
            -DCXXMCP_BUILD_TESTS=ON `
            -DCXXMCP_ENABLE_AUTH=ON `
            -DCXXMCP_ENABLE_HTTP=ON

      - name: Build auth tests
        shell: pwsh
        run: cmake --build build-auth-release-gate --parallel

      - name: Run auth release gate
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "build-auth-release-gate/test-results" | Out-Null
          ctest `
            --test-dir build-auth-release-gate `
            -R "^(auth|public_header_auth.*|package_smoke)$" `
            --output-on-failure `
            --timeout 240 `
            --output-junit test-results/auth-release-gate.xml
          if (!(Test-Path "build-auth-release-gate/test-results/auth-release-gate.xml")) {
            throw "missing JUnit evidence: build-auth-release-gate/test-results/auth-release-gate.xml"
          }

      - name: Upload auth release gate evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-auth-release-gate-${{ matrix.name }}
          path: |
            build-auth-release-gate/CMakeCache.txt
            build-auth-release-gate/test-results/auth-release-gate.xml
            build-auth-release-gate/Testing/Temporary/*.log
          if-no-files-found: error

  auth-openssl-release-gate:
    name: auth-openssl-linux-gcc-ninja
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install OpenSSL build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build libssl-dev

      - name: Configure OpenSSL auth SDK
        run: |
          cmake \
            -S . \
            -B build-auth-openssl-release-gate \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCXXMCP_BUILD_SDK=ON \
            -DCXXMCP_BUILD_CLIENT=ON \
            -DCXXMCP_BUILD_SERVER=ON \
            -DCXXMCP_BUILD_EXAMPLES=OFF \
            -DCXXMCP_BUILD_TESTS=ON \
            -DCXXMCP_ENABLE_AUTH=ON \
            -DCXXMCP_ENABLE_HTTP=ON \
            -DCXXMCP_AUTH_CRYPTO=OpenSSL

      - name: Build OpenSSL auth tests
        run: cmake --build build-auth-openssl-release-gate --parallel

      - name: Run OpenSSL auth release gate
        run: |
          mkdir -p build-auth-openssl-release-gate/test-results
          ctest \
            --test-dir build-auth-openssl-release-gate \
            -R "^(auth|auth_openssl|public_header_auth.*|package_smoke)$" \
            --output-on-failure \
            --timeout 300 \
            --output-junit test-results/auth-openssl-release-gate.xml
          test -s build-auth-openssl-release-gate/test-results/auth-openssl-release-gate.xml

      - name: Upload OpenSSL auth release gate evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-auth-openssl-release-gate-linux-gcc-ninja
          path: |
            build-auth-openssl-release-gate/CMakeCache.txt
            build-auth-openssl-release-gate/test-results/auth-openssl-release-gate.xml
            build-auth-openssl-release-gate/Testing/Temporary/*.log
          if-no-files-found: error

  release-blocking:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-gcc-ninja
            os: ubuntu-latest
            generator: Ninja
            build_type: Debug
            cc: gcc
            cxx: g++
          - name: linux-clang-ninja
            os: ubuntu-latest
            generator: Ninja
            build_type: Debug
            cc: clang
            cxx: clang++
          - name: macos-appleclang-ninja
            os: macos-latest
            generator: Ninja
            build_type: Debug
          - name: windows-msvc-ninja-static-runtime
            os: windows-latest
            generator: Ninja
            build_type: Debug
            cc: cl
            cxx: cl
            msvc_runtime: MultiThreaded$<$<CONFIG:Debug>:Debug>
          - name: windows-clangcl-ninja-static-runtime
            os: windows-latest
            generator: Ninja
            build_type: Debug
            cc: clang-cl
            cxx: clang-cl
            msvc_runtime: MultiThreaded$<$<CONFIG:Debug>:Debug>
          - name: windows-msvc-ninja-dynamic-runtime
            os: windows-latest
            generator: Ninja
            build_type: Debug
            cc: cl
            cxx: cl
            msvc_runtime: MultiThreaded$<$<CONFIG:Debug>:Debug>DLL

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup MSVC developer environment
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Install Ninja
        if: matrix.generator == 'Ninja'
        shell: bash
        run: |
          if [[ "${RUNNER_OS}" == "Linux" ]]; then
            sudo apt-get update
            sudo apt-get install -y ninja-build
          elif [[ "${RUNNER_OS}" == "macOS" ]]; then
            brew install ninja
          elif [[ "${RUNNER_OS}" == "Windows" ]]; then
            choco install ninja --no-progress
          fi

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Setup Node
        uses: actions/setup-node@v7
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Checkout pinned RMCP reference
        shell: bash
        run: |
          mkdir -p reference
          git clone https://github.com/modelcontextprotocol/rust-sdk.git reference/rmcp
          git -C reference/rmcp checkout c330fede90e4729c234f8e87fdbc5ea27a1dd10c

      - name: Cache Rust cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: release-gates
          shared-key: windows-rust
          workspaces: |
            reference/rmcp/conformance
            tests/fixtures/rmcp_pagination_client
          env-vars: CARGO_TARGET_DIR
          cache-targets: true
          cache-on-failure: false
          save-if: ${{ github.ref == 'refs/heads/master' }}

      - name: Configure
        shell: pwsh
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: |
          $cmakeArgs = @(
            "-S", ".",
            "-B", "build-release-gates",
            "-G", "${{ matrix.generator }}",
            "-DCXXMCP_BUILD_SDK=ON",
            "-DCXXMCP_BUILD_CLIENT=ON",
            "-DCXXMCP_BUILD_SERVER=ON",
            "-DCXXMCP_BUILD_EXAMPLES=ON",
            "-DCXXMCP_BUILD_TESTS=ON",
            "-DCXXMCP_ENABLE_HTTP=ON",
            "-DCXXMCP_ENABLE_WEBSOCKET=ON",
            "-DCXXMCP_ENABLE_AUTH=ON"
          )
          if ("${{ matrix.build_type }}") {
            $cmakeArgs += "-DCMAKE_BUILD_TYPE=${{ matrix.build_type }}"
          }
          if ("${{ matrix.msvc_runtime }}") {
            $cmakeArgs += "-DCXXMCP_MSVC_RUNTIME_LIBRARY=${{ matrix.msvc_runtime }}"
          }
          cmake @cmakeArgs

      - name: Build
        shell: pwsh
        run: |
          $buildArgs = @("--build", "build-release-gates", "--parallel")
          if ("${{ matrix.config }}") {
            $buildArgs += @("--config", "${{ matrix.config }}")
          }
          cmake @buildArgs

      - name: Run release-blocking tests
        shell: pwsh
        run: |
          foreach ($name in @("ALL_PROXY", "HTTPS_PROXY", "HTTP_PROXY", "all_proxy", "https_proxy", "http_proxy")) {
            Remove-Item "Env:$name" -ErrorAction SilentlyContinue
          }
          New-Item -ItemType Directory -Force -Path "build-release-gates/test-results" | Out-Null
          $ctestArgs = @(
            "--test-dir", "build-release-gates",
            "-L", "release-blocking",
            "--output-on-failure",
            "--timeout", "600",
            "--output-junit", "test-results/release-blocking.xml"
          )
          if ("${{ matrix.config }}") {
            $ctestArgs += @("-C", "${{ matrix.config }}")
          }
          ctest @ctestArgs
          if (!(Test-Path "build-release-gates/test-results/release-blocking.xml")) {
            throw "missing JUnit evidence: build-release-gates/test-results/release-blocking.xml"
          }

      - name: Upload release gate evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-release-gates-${{ matrix.name }}
          path: |
            build-release-gates/CMakeCache.txt
            build-release-gates/test-results/release-blocking.xml
            build-release-gates/Testing/Temporary/*.log
          if-no-files-found: error

  package-manager-vcpkg:
    name: package-vcpkg-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            feature: ""
            http_enabled: "OFF"
            openssl_enabled: "OFF"
            auth_openssl_enabled: "OFF"
            auth_enabled: "OFF"
            websocket_enabled: "OFF"
          - name: http
            feature: "[http]"
            http_enabled: "ON"
            openssl_enabled: "OFF"
            auth_openssl_enabled: "OFF"
            auth_enabled: "OFF"
            websocket_enabled: "OFF"
          - name: websocket
            feature: "[websocket]"
            http_enabled: "ON"
            openssl_enabled: "OFF"
            auth_openssl_enabled: "OFF"
            auth_enabled: "OFF"
            websocket_enabled: "ON"
          - name: http-openssl
            feature: "[http,openssl]"
            http_enabled: "ON"
            openssl_enabled: "ON"
            auth_openssl_enabled: "OFF"
            auth_enabled: "OFF"
            websocket_enabled: "OFF"
          - name: websocket-openssl
            feature: "[websocket,openssl]"
            http_enabled: "ON"
            openssl_enabled: "ON"
            auth_openssl_enabled: "OFF"
            auth_enabled: "OFF"
            websocket_enabled: "ON"
          - name: http-auth
            feature: "[http,auth]"
            http_enabled: "ON"
            openssl_enabled: "OFF"
            auth_openssl_enabled: "OFF"
            auth_enabled: "ON"
            websocket_enabled: "OFF"
          - name: websocket-auth
            feature: "[websocket,auth]"
            http_enabled: "ON"
            openssl_enabled: "OFF"
            auth_openssl_enabled: "OFF"
            auth_enabled: "ON"
            websocket_enabled: "ON"
          - name: auth-openssl
            feature: "[auth,openssl]"
            http_enabled: "OFF"
            openssl_enabled: "ON"
            auth_openssl_enabled: "ON"
            auth_enabled: "ON"
            websocket_enabled: "OFF"
          - name: http-auth-openssl
            feature: "[http,auth,openssl]"
            http_enabled: "ON"
            openssl_enabled: "ON"
            auth_openssl_enabled: "ON"
            auth_enabled: "ON"
            websocket_enabled: "OFF"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y git curl zip unzip tar ninja-build

      - name: Bootstrap vcpkg
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "${RUNNER_TEMP}/vcpkg"
          "${RUNNER_TEMP}/vcpkg/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install cxxmcp overlay package
        run: |
          set -euo pipefail
          mkdir -p "build-package-vcpkg-${{ matrix.name }}"
          "${RUNNER_TEMP}/vcpkg/vcpkg" install "cxxmcp-sdk${{ matrix.feature }}" \
            --overlay-ports="${GITHUB_WORKSPACE}/packaging/vcpkg/ports" \
            --triplet x64-linux \
            2>&1 | tee "build-package-vcpkg-${{ matrix.name }}/vcpkg-install.log"

      - name: Build clean CMake consumer
        run: |
          set -euo pipefail
          cmake \
            -S tests/fixtures/package_smoke \
            -B "build-package-vcpkg-${{ matrix.name }}" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${RUNNER_TEMP}/vcpkg/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DCXXMCP_PACKAGE_SMOKE_HTTP_ENABLED=${{ matrix.http_enabled }} \
            -DCXXMCP_PACKAGE_SMOKE_OPENSSL_ENABLED=${{ matrix.openssl_enabled }} \
            -DCXXMCP_PACKAGE_SMOKE_AUTH_ENABLED=${{ matrix.auth_enabled }} \
            -DCXXMCP_PACKAGE_SMOKE_AUTH_OPENSSL_ENABLED=${{ matrix.auth_openssl_enabled }} \
            -DCXXMCP_PACKAGE_SMOKE_WEBSOCKET_ENABLED=${{ matrix.websocket_enabled }} \
            2>&1 | tee "build-package-vcpkg-${{ matrix.name }}/cmake-configure.log"
          cmake --build "build-package-vcpkg-${{ matrix.name }}" --parallel \
            2>&1 | tee "build-package-vcpkg-${{ matrix.name }}/cmake-build.log"

      - name: Upload vcpkg package evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-package-vcpkg-${{ matrix.name }}
          path: |
            build-package-vcpkg-${{ matrix.name }}/CMakeCache.txt
            build-package-vcpkg-${{ matrix.name }}/CMakeFiles/CMakeConfigureLog.yaml
            build-package-vcpkg-${{ matrix.name }}/*.log
            ${{ runner.temp }}/vcpkg/installed/vcpkg/status
          if-no-files-found: error

  package-manager-conan:
    name: package-conan-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            with_http: "False"
            with_websocket: "False"
            with_auth: "False"
            http_enabled: "OFF"
            auth_enabled: "OFF"
            auth_openssl_enabled: "OFF"
            openssl_enabled: "OFF"
            websocket_enabled: "OFF"
          - name: http
            with_http: "True"
            with_websocket: "False"
            with_auth: "False"
            http_enabled: "ON"
            auth_enabled: "OFF"
            auth_openssl_enabled: "OFF"
            openssl_enabled: "OFF"
            websocket_enabled: "OFF"
          - name: websocket
            with_http: "False"
            with_websocket: "True"
            with_auth: "False"
            http_enabled: "ON"
            auth_enabled: "OFF"
            auth_openssl_enabled: "OFF"
            openssl_enabled: "OFF"
            websocket_enabled: "ON"
          - name: http-auth
            with_http: "True"
            with_websocket: "False"
            with_auth: "True"
            http_enabled: "ON"
            auth_enabled: "ON"
            auth_openssl_enabled: "OFF"
            openssl_enabled: "OFF"
            websocket_enabled: "OFF"
          - name: websocket-auth
            with_http: "False"
            with_websocket: "True"
            with_auth: "True"
            http_enabled: "ON"
            auth_enabled: "ON"
            auth_openssl_enabled: "OFF"
            openssl_enabled: "OFF"
            websocket_enabled: "ON"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build
          python -m pip install --user "conan>=2,<3"
          echo "${HOME}/.local/bin" >> "${GITHUB_PATH}"

      - name: Create Conan package
        run: |
          set -euo pipefail
          mkdir -p "build-package-conan-${{ matrix.name }}"
          conan profile detect --force
          conan create . \
            -s build_type=Release \
            -o cxxmcp/*:with_http=${{ matrix.with_http }} \
            -o cxxmcp/*:with_websocket=${{ matrix.with_websocket }} \
            -o cxxmcp/*:with_auth=${{ matrix.with_auth }} \
            2>&1 | tee "build-package-conan-${{ matrix.name }}/conan-create.log"

      - name: Install Conan consumer dependencies
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          conan install \
            --requires="cxxmcp/${version}" \
            --generator=CMakeDeps \
            --generator=CMakeToolchain \
            --output-folder="build-package-conan-${{ matrix.name }}-deps" \
            --build=missing \
            -s build_type=Release \
            -o cxxmcp/*:with_http=${{ matrix.with_http }} \
            -o cxxmcp/*:with_websocket=${{ matrix.with_websocket }} \
            -o cxxmcp/*:with_auth=${{ matrix.with_auth }} \
            2>&1 | tee "build-package-conan-${{ matrix.name }}/conan-install.log"

      - name: Build clean CMake consumer
        run: |
          set -euo pipefail
          toolchain="$(find "build-package-conan-${{ matrix.name }}-deps" -name conan_toolchain.cmake -print -quit)"
          test -n "${toolchain}"
          toolchain="$(realpath "${toolchain}")"
          cmake \
            -S tests/fixtures/package_smoke \
            -B "build-package-conan-${{ matrix.name }}" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="${toolchain}" \
            -DCXXMCP_PACKAGE_SMOKE_HTTP_ENABLED=${{ matrix.http_enabled }} \
            -DCXXMCP_PACKAGE_SMOKE_OPENSSL_ENABLED=${{ matrix.openssl_enabled }} \
            -DCXXMCP_PACKAGE_SMOKE_AUTH_ENABLED=${{ matrix.auth_enabled }} \
            -DCXXMCP_PACKAGE_SMOKE_AUTH_OPENSSL_ENABLED=${{ matrix.auth_openssl_enabled }} \
            -DCXXMCP_PACKAGE_SMOKE_WEBSOCKET_ENABLED=${{ matrix.websocket_enabled }} \
            2>&1 | tee "build-package-conan-${{ matrix.name }}/cmake-configure.log"
          cmake --build "build-package-conan-${{ matrix.name }}" --parallel \
            2>&1 | tee "build-package-conan-${{ matrix.name }}/cmake-build.log"

      - name: Upload Conan package evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-package-conan-${{ matrix.name }}
          path: |
            build-package-conan-${{ matrix.name }}/CMakeCache.txt
            build-package-conan-${{ matrix.name }}/CMakeFiles/CMakeConfigureLog.yaml
            build-package-conan-${{ matrix.name }}/*.log
            build-package-conan-${{ matrix.name }}-deps/**
          if-no-files-found: error

  package-manager-xmake:
    name: package-xmake-${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: default
            http_enabled: "false"
            websocket_enabled: "false"
            auth_enabled: "false"
            auth_define: ""
            http_define: ""
            websocket_define: ""
          - name: http
            http_enabled: "true"
            websocket_enabled: "false"
            auth_enabled: "false"
            auth_define: ""
            http_define: "add_defines(\"CXXMCP_PACKAGE_SMOKE_HTTP\")"
            websocket_define: ""
          - name: websocket
            http_enabled: "false"
            websocket_enabled: "true"
            auth_enabled: "false"
            auth_define: ""
            http_define: "add_defines(\"CXXMCP_PACKAGE_SMOKE_HTTP\")"
            websocket_define: "add_defines(\"CXXMCP_PACKAGE_SMOKE_WEBSOCKET\")"
          - name: http-auth
            http_enabled: "true"
            websocket_enabled: "false"
            auth_enabled: "true"
            auth_define: "add_defines(\"CXXMCP_PACKAGE_SMOKE_AUTH\")"
            http_define: "add_defines(\"CXXMCP_PACKAGE_SMOKE_HTTP\")"
            websocket_define: ""
          - name: websocket-auth
            http_enabled: "false"
            websocket_enabled: "true"
            auth_enabled: "true"
            auth_define: "add_defines(\"CXXMCP_PACKAGE_SMOKE_AUTH\")"
            http_define: "add_defines(\"CXXMCP_PACKAGE_SMOKE_HTTP\")"
            websocket_define: "add_defines(\"CXXMCP_PACKAGE_SMOKE_WEBSOCKET\")"

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup xmake
        uses: xmake-io/github-action-setup-xmake@v1

      - name: Create xmake consumer
        shell: bash
        env:
          XMAKE_PACKAGE_NAME: ${{ matrix.name }}
        run: |
          set -euo pipefail
          version="$(tr -d '\r\n' < VERSION)"
          export CXXMCP_PACKAGE_VERSION="${version}"
          mkdir -p "build-package-xmake-${{ matrix.name }}"
          mkdir -p "build-package-xmake-${{ matrix.name }}/repo/packages/c"
          cp -R packaging/xmake/packages/c/cxxmcp \
            "build-package-xmake-${{ matrix.name }}/repo/packages/c/cxxmcp"
          tar \
            --exclude='.git' \
            --exclude='build-package-xmake-*' \
            -czf "build-package-xmake-${{ matrix.name }}/cxxmcp-xmake-source-${GITHUB_SHA}.tar.gz" \
            .
          python - <<'PY'
          import hashlib
          import os
          import re
          from pathlib import Path

          name = os.environ["XMAKE_PACKAGE_NAME"]
          version = os.environ["CXXMCP_PACKAGE_VERSION"]
          tag = f"v{version}"
          workspace = Path(os.environ["GITHUB_WORKSPACE"])
          root = workspace / f"build-package-xmake-{name}"
          archive = root / f"cxxmcp-xmake-source-{os.environ['GITHUB_SHA']}.tar.gz"
          digest = hashlib.sha256(archive.read_bytes()).hexdigest()
          recipe = root / "repo" / "packages" / "c" / "cxxmcp" / "xmake.lua"
          text = recipe.read_text(encoding="utf-8")
          text, url_count = re.subn(
              r'add_urls\(".*?"\)',
              f'add_urls("file://{archive.as_posix()}")',
              text,
          )
          text, version_count = re.subn(
              r'add_versions\("v\d+\.\d+\.\d+",\s*".*?"\)',
              f'add_versions("{tag}", "{digest}")',
              text,
          )
          if url_count != 1:
              raise SystemExit(f"expected one add_urls rewrite, got {url_count}")
          if version_count != 1:
              raise SystemExit(f"expected one {tag} add_versions rewrite, got {version_count}")
          if f'file://{archive.as_posix()}' not in text:
              raise SystemExit("xmake recipe was not rewritten to the generated source archive")
          if "github.com" in text or "releases/download" in text:
              raise SystemExit("xmake recipe still contains a remote release archive URL")
          recipe.write_text(text, encoding="utf-8")
          PY
          cat > "build-package-xmake-${{ matrix.name }}/xmake.lua" <<EOF
          add_rules("mode.release")
          set_languages("c++17")
          add_repositories("cxxmcp-local repo")
          add_requires("cxxmcp v${version}", {configs = {http = ${{ matrix.http_enabled }}, websocket = ${{ matrix.websocket_enabled }}, auth = ${{ matrix.auth_enabled }}}})

          target("consumer")
              set_kind("binary")
              add_files("main.cpp")
              add_packages("cxxmcp")
              ${{ matrix.auth_define }}
              ${{ matrix.http_define }}
              ${{ matrix.websocket_define }}
          EOF
          cat > "build-package-xmake-${{ matrix.name }}/main.cpp" <<'EOF'
          #include <cstdint>
          #include <memory>
          #include <utility>
          #include <cxxmcp/protocol/serialization.hpp>
          #ifdef CXXMCP_PACKAGE_SMOKE_AUTH
          #include <cxxmcp/auth.hpp>
          #endif
          #ifdef CXXMCP_PACKAGE_SMOKE_HTTP
          #include <cxxmcp/transport/http_transport.hpp>
          #endif
          #ifdef CXXMCP_PACKAGE_SMOKE_WEBSOCKET
          #include <cxxmcp/peer.hpp>
          #include <cxxmcp/transport/websocket_transport.hpp>
          #endif

          int main() {
              auto request = mcp::protocol::make_ping_request(std::int64_t{1});
              auto serialized = mcp::protocol::serialize_request(request);
              (void)serialized;
          #ifdef CXXMCP_PACKAGE_SMOKE_AUTH
              mcp::auth::ClientRegistrationOptions options;
              options.redirect_uri = "http://localhost/callback";
              auto registration =
                  mcp::auth::build_client_registration_request(options);
              (void)registration;
          #endif
          #ifdef CXXMCP_PACKAGE_SMOKE_HTTP
              mcp::transport::StreamableHttpClientTransportOptions http_options;
              http_options.uri = "http://127.0.0.1:3001/mcp";
              auto http_client =
                  std::make_unique<mcp::transport::StreamableHttpClientTransport>(
                      std::move(http_options));
              (void)http_client;
          #endif
          #ifdef CXXMCP_PACKAGE_SMOKE_WEBSOCKET
              auto builder = mcp::ClientPeer::builder();
              builder.websocket("ws://127.0.0.1:3001/mcp");
              mcp::transport::WebSocketClientTransportOptions client_options;
              client_options.uri = "ws://127.0.0.1:3001/mcp";
              auto client =
                  std::make_unique<mcp::transport::WebSocketClientTransport>(
                      std::move(client_options));
              (void)client;
          #endif
              return 0;
          }
          EOF

      - name: Build xmake consumer
        working-directory: build-package-xmake-${{ matrix.name }}
        run: |
          set -euo pipefail
          xmake repo --add cxxmcp-local "${GITHUB_WORKSPACE}/build-package-xmake-${{ matrix.name }}/repo" \
            2>&1 | tee xmake-repo.log
          xmake --yes 2>&1 | tee xmake-build.log

      - name: Upload xmake package evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-package-xmake-${{ matrix.name }}
          path: |
            build-package-xmake-${{ matrix.name }}/xmake.lua
            build-package-xmake-${{ matrix.name }}/main.cpp
            build-package-xmake-${{ matrix.name }}/repo/**
            build-package-xmake-${{ matrix.name }}/cxxmcp-xmake-source-*.tar.gz
            build-package-xmake-${{ matrix.name }}/*.log
            build-package-xmake-${{ matrix.name }}/build/**
            build-package-xmake-${{ matrix.name }}/.xmake/**
          if-no-files-found: error

  docs-artifact:
    name: doxygen-docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz ninja-build

      - name: Configure docs
        run: >
          cmake -S . -B build-docs -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCXXMCP_BUILD_DOCS=ON
          -DCXXMCP_BUILD_TESTS=OFF

      - name: Build docs
        run: cmake --build build-docs --target docs

      - name: Verify docs artifact
        run: test -f docs/doxygen/html/index.html

      - name: Upload docs artifact
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-doxygen-html
          path: docs/doxygen/html
          if-no-files-found: error

  source-artifact:
    name: source-artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create source archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts
          archive="release-artifacts/cxxmcp-source-${GITHUB_SHA}.tar.gz"
          tar \
            --exclude-vcs \
            --exclude='./.cache' \
            --exclude='./out' \
            --exclude='./build' \
            --exclude='./build-*' \
            --exclude='./docs/doxygen' \
            --exclude='./release-artifacts' \
            -czf "${archive}" .
          sha256sum "${archive}" > release-artifacts/SHA256SUMS.txt

      - name: Upload source artifact
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-source
          path: release-artifacts
          if-no-files-found: error

  release-evidence:
    name: release-evidence
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Collect release evidence documents
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-evidence/docs release-evidence/examples release-evidence/scripts release-evidence/templates
          cp \
            README.md \
            README_zh.md \
            CHANGELOG.md \
            CONTRIBUTING.md \
            SECURITY.md \
            CODE_OF_CONDUCT.md \
            todo.md \
            release-evidence/
          cp \
            docs/adoption_ledger.md \
            docs/auth_design.md \
            docs/auth_user_guide.md \
            docs/compatibility_policy.md \
            docs/dependency_policy.md \
            docs/capability_lifecycles.md \
            docs/ecosystem_maturity_evidence.md \
            docs/examples.md \
            docs/official_sdk_candidate_process.md \
            docs/package_consumption.md \
            docs/package_consumption_zh.md \
            docs/performance_debt.md \
            docs/protocol_model_audit.md \
            docs/public_api_stability.md \
            docs/release_process.md \
            docs/release_gates.md \
            docs/release_candidate_checklist.md \
            docs/release_notes_template.md \
            docs/request_lifecycle.md \
            docs/rmcp_source_mapping.json \
            docs/runtime_gateway.md \
            docs/technical_audit.md \
            release-evidence/docs/
          cp -r docs/pages release-evidence/docs/pages
          test -f release-evidence/docs/pages/index.html
          test -f release-evidence/docs/pages/getting-started.html
          test -f release-evidence/docs/pages/auth.html
          test -f release-evidence/docs/pages/stability.html
          cp \
            scripts/check_release_artifacts.py \
            scripts/check_release_evidence.py \
            scripts/check_package_auth_features.py \
            scripts/check_package_recipe_sync.py \
            scripts/check_p2_todo_status.py \
            scripts/check_protocol_model_coverage.py \
            scripts/check_rmcp_source_drift.py \
            scripts/check_sdk_header_boundaries.py \
            scripts/check_source_markers.py \
            scripts/compare_public_api_surface.py \
            scripts/collect_public_api_surface.py \
            scripts/collect_public_header_compile_evidence.py \
            scripts/selftest_release_artifacts.py \
            scripts/selftest_public_api_surface.py \
            release-evidence/scripts/
          python scripts/collect_public_api_surface.py \
            --source . \
            --output release-evidence/public-api-surface.json
          cp -r examples/. release-evidence/examples/
          cp -r templates/external_consumer release-evidence/templates/
          {
            echo "commit=${GITHUB_SHA}"
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "mcp_protocol_snapshot=2025-11-25"
            echo "rmcp_reference_commit=c330fede90e4729c234f8e87fdbc5ea27a1dd10c"
            echo "typescript_sdk_reference=@modelcontextprotocol/sdk@1.29.0"
            echo "python_sdk_reference=mcp==1.27.1"
          } > release-evidence/MANIFEST.txt

      - name: Verify release evidence
        run: python scripts/check_release_evidence.py --source . --evidence release-evidence

      - name: Upload release evidence
        uses: actions/upload-artifact@v7
        with:
          name: cxxmcp-release-evidence
          path: release-evidence
          if-no-files-found: error
